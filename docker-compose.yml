services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wealthwise
      POSTGRES_PASSWORD: wealthwise
      POSTGRES_DB: wealthwise
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wealthwise"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ./backend
      dockerfile: ../docker/api.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://wealthwise:wealthwise@postgres:5432/wealthwise
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: wealthwise
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      CORS_ORIGINS: '["http://localhost:3000"]'
      JWT_SECRET: dev-secret-change-in-production-32-chars
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "cd /app && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ./backend
      dockerfile: ../docker/worker.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://wealthwise:wealthwise@postgres:5432/wealthwise
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: wealthwise
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
      - frontend

volumes:
  pg_data:
  minio_data:
